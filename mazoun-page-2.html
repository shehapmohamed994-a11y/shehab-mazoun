<h1>دليل الأحوال الشخصية ومحاكم الأسرة في مصر | الأستاذ شهاب محمد الشيمي – مأذون شرعي</h1>

<p>
مرحبًا بكم في الدليل الشامل للأحوال الشخصية والزواج في مصر.
تجمع هذه الصفحة أهم المعلومات المتعلقة بعقد الزواج الشرعي، وحقوق الزوجين، وإجراءات محاكم الأسرة، والنفقة، والحضانة، والرؤية، والخلع، والطلاق، وزواج المصريين والأجانب، وغيرها من الموضوعات التي يبحث عنها المواطن المصري بصورة مستمرة.
</p>

<div class="alert">
<strong>تنبيه:</strong>
المحتوى الموجود بهذه الصفحة للتوعية العامة فقط ولا يُعد استشارة قانونية أو فتوى شرعية، وقد تختلف الإجراءات حسب ظروف كل حالة وما يستجد من قوانين أو أحكام قضائية.

<h2>ما هو عقد الزواج الشرعي؟</h2>

<p>
عقد الزواج هو عقد شرعي وقانوني يتم وفقًا لأحكام الشريعة الإسلامية والقوانين المنظمة لذلك في جمهورية مصر العربية، ويقوم المأذون الشرعي المختص بتحرير العقد وتوثيقه بعد التأكد من استيفاء جميع الشروط القانونية والشرعية.
</p>

</section>

<section id="documents">

<h2>الأوراق المطلوبة لعقد الزواج</h2>

<ul>

<li>بطاقة رقم قومي سارية للزوج.</li>

<li>بطاقة رقم قومي سارية للزوجة.</li>

<li>شهادة الفحص الطبي للزوجين.</li>

<li>عدد 5 صور شخصية لكل طرف (إذا كانت مطلوبة).</li>

<li>حضور شاهدين بالغين.</li>

<li>ولي الزوجة في الحالات التي يوجبها القانون أو الشريعة.</li>

</ul>

</section>

<section id="foreign">

<h2>زواج المصريين والأجانب</h2>

<p>

يقوم المأذون الشرعي بإتمام إجراءات عقد الزواج وفقًا للضوابط القانونية، مع مراعاة المستندات المطلوبة لكل جنسية، ثم استكمال باقي إجراءات التصديقات إذا لزم الأمر.

</p>

</section>

<section id="family-court">

<h2>ما هي محكمة الأسرة؟</h2>

<p>

محكمة الأسرة هي المحكمة المختصة بالفصل في أغلب المنازعات المتعلقة بالأحوال الشخصية، مثل النفقة، والحضانة، والرؤية، والطلاق، والخلع، وإثبات النسب، وغيرها من الدعاوى التي ينظمها قانون الأحوال الشخصية.

</p>

</section>

<section id="nafaqa">

<h2>النفقة</h2>

<p>

تشمل النفقة أنواعًا متعددة مثل نفقة الزوجة، ونفقة الصغار، ونفقة المتعة، ونفقة العدة، ويختلف استحقاق كل نوع وفقًا للقانون وظروف كل حالة.

</p>

</section>

<section id="custody">

<h2>الحضانة والرؤية</h2>

<p>

ينظم قانون الأحوال الشخصية أحكام حضانة الأطفال، وحق الرؤية والاستضافة، بما يحقق مصلحة الطفل باعتبارها الأساس الذي تعتمد عليه المحكمة عند الفصل في النزاعات.

</p>

</section>

<section id="divorce">

<h2>الطلاق والخلع</h2>

<p>

يختلف الطلاق عن الخلع من حيث الإجراءات والآثار القانونية، ولكل منهما أحكام وشروط ينظمها القانون المصري.

</p>

</section>

<h2>حقوق الزوجين</h2>

<ul>

<li>المعاشرة بالمعروف.</li>

<li>النفقة.</li>

<li>المهر.</li>

<li>الميراث.</li>

<li>إثبات النسب.</li>

<li>حسن المعاملة.</li>

</ul>

</section>

  function toRad(v){ return v * Math.PI / 180; }
  function distanceKm(lat1, lng1, lat2, lng2){
    var R = 6371;
    var dLat = toRad(lat2-lat1);
    var dLng = toRad(lng2-lng1);
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
    var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R*c;
  }

  function showBranch(branch, extra){
    var el = document.getElementById('branchAddress');
    el.textContent = (extra || 'أقرب فرع لك: ') + branch.name + ' — ' + branch.address;
  }

  function findNearest(userLat, userLng){
    var nearest = branches[0], minDist = Infinity;
    branches.forEach(function(b){
      var d = distanceKm(userLat, userLng, b.lat, b.lng);
      if(d < minDist){ minDist = d; nearest = b; }
    });
    showBranch(nearest, 'أقرب فرع لك: ');
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){ findNearest(pos.coords.latitude, pos.coords.longitude); },
      function(){ showBranch(branches[0], ''); },
      { timeout: 8000 }
    );
  } else {
    showBranch(branches[0], '');
